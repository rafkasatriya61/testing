<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keamanan Scan Wajah</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
        }
        #camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }
        /* Efek kotak hijau seperti scanner */
        #scanner-box {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 4px solid #00ff00;
            border-radius: 20px;
            box-shadow: 0 0 20px #00ff00;
            z-index: 2;
        }
        /* Garis scan yang bergerak naik turun */
        #scanner-line {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 0, 0.8);
            position: absolute;
            top: 0;
            box-shadow: 0 0 10px #00ff00;
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        #text-info {
            position: absolute;
            bottom: 15%;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
            z-index: 2;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        /* Gambar prank yang disembunyikan di awal */
        #prank-image {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <div id="scanner-box">
            <div id="scanner-line"></div>
        </div>
        <div id="text-info">Mendeteksi Wajah... Posisikan Wajah Anda</div>
    </div>

    <img id="prank-image" src="https://i.imgflip.com/4/33eb5n.jpg" alt="Prank!">

    <script>
        const video = document.getElementById('video');
        const prankImage = document.getElementById('prank-image');
        const cameraContainer = document.getElementById('camera-container');
        const textInfo = document.getElementById('text-info');

        // Meminta akses kamera depan (user facing camera)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
                
                // Ubah teks setelah 2 detik supaya terlihat realistis
                setTimeout(() => {
                    textInfo.innerText = "Menganalisis Data...";
                    textInfo.style.color = "yellow";
                }, 2000);

                // Eksekusi Prank setelah 5 detik
                setTimeout(() => {
                    // Matikan akses kamera agar lampu indikator kamera mati
                    stream.getTracks().forEach(track => track.stop());
                    
                    // Sembunyikan layar kamera dan munculkan gambar
                    cameraContainer.style.display = 'none';
                    prankImage.style.display = 'block';
                    
                    // (Opsional) Jika ingin menambah suara kaget, kamu bisa pakai kode di bawah ini:
                    // let audio = new Audio('LINK_AUDIO_MP3_KAMU_DISINI');
                    // audio.play();
                    
                }, 5000); // Angka 5000 = 5 detik. Bisa kamu ubah sesuai selera.
            })
            .catch(err => {
                console.error("Kamera gagal diakses:", err);
                textInfo.innerText = "Akses Kamera Ditolak / Tidak Tersedia";
                textInfo.style.color = "red";
                textInfo.style.animation = "none";
            });
    </script>

</body>
</html>
